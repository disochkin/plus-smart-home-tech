server:
  port: 0
spring:
  application:
    name: shopping-cart
  config:
    import: "configserver:"
    cloud:
      config:
        discovery:
          enabled: true
          serviceId: config-server
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    instance:
      hostname: localhost
      instance-id: ${spring.application.name}:${random.int}
